program: popgym_arcade/train.py
name: pqn-rnn-mingru-battleship
project: obsgapmingru
method: grid
metric:
  name: returned_episode_returns
  goal: maximize

parameters:
  ENV_NAME:
    values:
      - BattleShipEasy
  PARTIAL:
    values:
      - false
      - true
  NUM_LAYERS:
    values:
      - 1
      - 2
      - 8
  HIDDEN_SIZE:
    values:
      - 128
      - 256
      - 512
  SEED:
    values:
      - 0
      - 1
      - 2

command:
  - ${env}
  - bash
  - -lc
  - |
      cmd=(
        python popgym_arcade/train.py PQN_RNN
        --MEMORY_TYPE "mingru"
        --TOTAL_TIMESTEPS "20000000"
        --TOTAL_TIMESTEPS_DECAY "2000000"
        --PROJECT "obsgapmingru"
        --ENV_NAME "${ENV_NAME}"
        --NUM_LAYERS "${NUM_LAYERS}"
        --HIDDEN_SIZE "${HIDDEN_SIZE}"
        --SEED "${SEED}"
      )

      if [ "${PARTIAL}" = "true" ]; then
        cmd+=(--PARTIAL)
      fi

      "${cmd[@]}"
