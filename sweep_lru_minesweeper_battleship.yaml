program: popgym_arcade/train.py
name: pqn-rnn-lru-minesweeper
project: obsgaplru
method: grid
metric:
  name: returned_episode_returns
  goal: maximize

parameters:
  ENV_NAME:
    values:
      - MineSweeperEasy
  PARTIAL:
    values:
      - false
      - true
  NUM_LAYERS:
    values:
      - 1
      - 2
      - 8
  HIDDEN_SIZE:
    values:
      - 128
      - 256
      - 512
  SEED:
    values:
      - 0
      - 1
      - 2

command:
  - ${env}
  - python
  - popgym_arcade/train.py
  - PQN_RNN
  - --MEMORY_TYPE
  - lru
  - --TOTAL_TIMESTEPS
  - "20000000"
  - --TOTAL_TIMESTEPS_DECAY
  - "2000000"
  - --PROJECT
  - obsgaplru
  - ${args_no_boolean_flags}
