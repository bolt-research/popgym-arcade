program: popgym_arcade/train.py
name: pqn-mlp-minesweeper-battleship
project: obsgapmlp
method: grid
metric:
  name: returned_episode_returns
  goal: maximize

parameters:
  ENV_NAME:
    values:
      - MineSweeperEasy
      - BattleShipEasy
  PARTIAL:
    values:
      - false
      - true
  SEED:
    values:
      - 0
      - 1
      - 2

command:
  - ${env}
  - python
  - popgym_arcade/train.py
  - PQN
  - --TOTAL_TIMESTEPS
  - "20000000"
  - --TOTAL_TIMESTEPS_DECAY
  - "2000000"
  - --PROJECT
  - obsgapmlp
  - ${args_no_boolean_flags}
