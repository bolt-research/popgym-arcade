program: popgym_arcade/train.py
name: pqn-mlp-minesweeper-battleship
project: obsgapmlp
method: grid
metric:
  name: returned_episode_returns
  goal: maximize

parameters:
  ENV_NAME:
    values:
      - MineSweeperEasy
      - BattleShipEasy
  PARTIAL:
    values:
      - false
      - true
  SEED:
    values:
      - 0
      - 1
      - 2

command:
  - ${env}
  - bash
  - -lc
  - |
      cmd=(
        python popgym_arcade/train.py PQN
        --TOTAL_TIMESTEPS "20000000"
        --TOTAL_TIMESTEPS_DECAY "2000000"
        --PROJECT "obsgapmlp"
        --ENV_NAME "${ENV_NAME}"
        --SEED "${SEED}"
      )

      if [ "${PARTIAL}" = "true" ]; then
        cmd+=(--PARTIAL)
      fi

      "${cmd[@]}"
